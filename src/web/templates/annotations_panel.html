<div class="ann-panel">

  <!-- ── Sub-tabs ──────────────────────────────────────────────────────────── -->
  <div id="ann-subtabs">
    <button class="ann-stbtn on" data-asub="edit">✏️ Edit</button>
    <button class="ann-stbtn"    data-asub="records">📝 Records</button>
  </div>

  <div id="ann-status" style="margin-top:6px;font-size:11px;color:#888;min-height:16px"></div>

  <!-- ── Pane: Edit (merged Scenes + Annotations) ──────────────────────────── -->
  <div id="ann-pane-edit" class="ann-pane">
    <div id="ae-list">
      <div class="ann-nav">
        <button class="nbtn" id="ae-prev">⬅</button>
        <select id="ae-sel" title="Pick a scene or annotation"></select>
        <button class="nbtn" id="ae-next">➡</button>
      </div>
      <div class="ae-actions">
        <button class="btn bp" id="ae-scene-add" title="Split a scene at the current playback time">🎬 Scene+</button>
        <button class="btn bp" id="ae-note-add"  title="Add an annotation at the current playback time">📍 Note+</button>
        <button class="btn"    id="ae-edit"      title="Edit the selected scene / annotation">✎ Edit</button>
      </div>
    </div>

    <div id="ae-edit-view" style="display:none">
      <div class="ae-edit-head">
        <span class="lbl-sm" id="ae-edit-label">—</span>
        <button class="btn" id="ae-edit-back">← Back</button>
      </div>
      <div class="ann-time-row"><span class="ann-time-cur" id="ae-edit-time">—</span></div>
      <div class="ann-time-grid ann-time-grid-4" id="ae-edit-nudges">
        <button class="nudge" data-aenudge="-0.5">&lt;</button>
        <button class="nudge" data-aenudge="0.5">&gt;</button>
        <button class="nudge" data-aenudge="-1">&lt;&lt;</button>
        <button class="nudge" data-aenudge="1">&gt;&gt;</button>
      </div>
      <div id="ae-first-hint" style="font-size:10px;color:#666;margin-bottom:8px;display:none">
        First scene's start is locked at 0:00:00.
      </div>
      <label class="lbl-sm">Description</label>
      <textarea id="ae-edit-text" class="ctx-input" rows="3" placeholder="Description…"></textarea>
      <button class="btn btn-danger" id="ae-edit-delete" style="margin-top:8px;width:100%">🗑 Delete</button>
    </div>

    <div id="ae-empty" class="ann-empty" style="display:none">
      No scenes or annotations yet. Tap <strong>🎬 Scene+</strong> or <strong>📍 Note+</strong>.
    </div>
  </div>

  <!-- ── Pane: Records (per-subtitle speaker + notes) ────────────────────── -->
  <div id="ann-pane-records" class="ann-pane" style="display:none">
    <div class="ann-nav">
      <button class="nbtn" id="rec-prev">⬅</button>
      <select id="rec-sel" title="Pick a subtitle record"></select>
      <button class="nbtn" id="rec-next">➡</button>
    </div>

    <div id="rec-edit" style="display:none;margin-top:10px">
      <div id="rec-no-chars" class="ann-empty" style="display:none;margin-bottom:10px">
        No characters yet — add some on the <strong>Context → Characters</strong> tab first.
      </div>
      <div id="rec-spk-section" style="display:none">
        <label class="lbl-sm">Speaker (tap to select; tap again to clear)</label>
        <div id="rec-pills" class="speaker-pills"></div>

        <label class="lbl-sm" style="margin-top:10px">Speaker note</label>
        <input id="rec-spnote" type="text" class="ctx-input"
               placeholder="e.g. talking to Simon · shouting / angry"/>
      </div>

      <label class="lbl-sm" style="margin-top:10px">Record note (LLM hints / transcription confidence)</label>
      <textarea id="rec-note" class="ctx-input" rows="4"
                placeholder="e.g. not confident on the transcription · proper noun, double-check spelling · whisper sometimes mishears X as Y"></textarea>

      <div id="rec-save-status" style="font-size:11px;color:#888;margin-top:6px;min-height:14px"></div>
    </div>
  </div>
</div>

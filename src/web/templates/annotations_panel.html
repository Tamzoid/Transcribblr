<div class="ann-panel">

  <!-- ── Sub-tabs ──────────────────────────────────────────────────────────── -->
  <div id="ann-subtabs">
    <button class="ann-stbtn on" data-asub="scenes">🎬 Scenes</button>
    <button class="ann-stbtn"    data-asub="notes">📍 Annotations</button>
    <button class="ann-stbtn"    data-asub="speakers">🎙 Speakers</button>
    <button class="ann-stbtn"    data-asub="recnotes">📝 Notes</button>
  </div>

  <div id="ann-status" style="margin-top:6px;font-size:11px;color:#888;min-height:16px"></div>

  <!-- ── Pane: Scenes ────────────────────────────────────────────────────── -->
  <div id="ann-pane-scenes" class="ann-pane">
    <div class="ann-nav">
      <button class="nbtn" id="sc-prev">⬅</button>
      <select id="sc-sel" title="Pick a scene"></select>
      <button class="nbtn" id="sc-next">➡</button>
      <button class="btn bp" id="sc-split">✂ Split here</button>
      <button class="btn"    id="sc-del" disabled>🗑 Delete</button>
    </div>

    <div class="ann-edit" id="sc-edit" style="display:none">
      <div class="ann-time-row">
        <span class="ann-time-cur" id="sc-time-cur">—</span>
        <span class="ann-time-dur" id="sc-time-dur">—</span>
      </div>
      <div class="ann-time-grid ann-time-grid-4" id="sc-nudges">
        <button class="nudge nudge-dn" id="sc-s-dd">⏪ −1s</button>
        <button class="nudge nudge-dn" id="sc-s-d">◀ −.5s</button>
        <button class="nudge nudge-up" id="sc-s-u">+.5s ▶</button>
        <button class="nudge nudge-up" id="sc-s-uu">+1s ⏩</button>
      </div>
      <div id="sc-first-hint" style="font-size:10px;color:#666;margin-bottom:8px;display:none">
        First scene's start is locked at 0:00:00.
      </div>

      <label class="lbl-sm">Description</label>
      <textarea id="sc-text" class="ctx-input" rows="3"
                placeholder="Brief description of this scene…"></textarea>
    </div>

    <div id="sc-empty" class="ann-empty">
      Setting up the root scene…
    </div>
  </div>

  <!-- ── Pane: Annotations ───────────────────────────────────────────────── -->
  <div id="ann-pane-notes" class="ann-pane" style="display:none">
    <div class="ann-nav">
      <button class="nbtn" id="an-prev">⬅</button>
      <select id="an-sel" title="Pick an annotation"></select>
      <button class="nbtn" id="an-next">➡</button>
      <button class="btn bp" id="an-add">＋ Add</button>
      <button class="btn"    id="an-del" disabled>🗑 Delete</button>
    </div>

    <div class="ann-edit" id="an-edit" style="display:none">
      <div class="ann-time-row">
        <span class="ann-time-cur" id="an-time-cur">—</span>
      </div>
      <div class="ann-time-grid ann-time-grid-4">
        <button class="nudge nudge-dn" id="an-s-dd">⏪ −1s</button>
        <button class="nudge nudge-dn" id="an-s-d">◀ −.5s</button>
        <button class="nudge nudge-up" id="an-s-u">+.5s ▶</button>
        <button class="nudge nudge-up" id="an-s-uu">+1s ⏩</button>
      </div>

      <label class="lbl-sm">Event — what happens at this point</label>
      <textarea id="an-text" class="ctx-input" rows="3"
                placeholder="e.g. John picks up a book"></textarea>
    </div>

    <div id="an-empty" class="ann-empty">
      No annotations yet. Tap <strong>＋ Add</strong> to create one at the current playback position.
    </div>
  </div>

  <!-- ── Pane: Speakers ──────────────────────────────────────────────────── -->
  <div id="ann-pane-speakers" class="ann-pane" style="display:none">
    <div class="ann-nav">
      <button class="nbtn" id="sp-prev">⬅</button>
      <select id="sp-sel" title="Pick a subtitle record"></select>
      <button class="nbtn" id="sp-next">➡</button>
    </div>

    <div id="sp-cur" class="cur-preview">No subtitle selected</div>

    <div id="sp-no-chars" class="ann-empty" style="display:none;margin-top:10px">
      No characters in this project yet — add some on the
      <strong>🧠 Context → 👥 Characters</strong> tab first.
    </div>

    <div id="sp-edit" style="display:none;margin-top:10px">
      <label class="lbl-sm">Speaker (tap to select; tap again to clear)</label>
      <div id="sp-pills" class="speaker-pills"></div>

      <label class="lbl-sm" style="margin-top:10px">Note (optional)</label>
      <input id="sp-note" type="text" class="ctx-input"
             placeholder="e.g. talking to Simon · shouting / angry"/>

      <div id="sp-save-status" style="font-size:11px;color:#888;margin-top:6px;min-height:14px"></div>
    </div>
  </div>

  <!-- ── Pane: Record Notes ──────────────────────────────────────────────── -->
  <div id="ann-pane-recnotes" class="ann-pane" style="display:none">
    <div class="ann-nav">
      <button class="nbtn" id="rn-prev">⬅</button>
      <select id="rn-sel" title="Pick a subtitle record"></select>
      <button class="nbtn" id="rn-next">➡</button>
    </div>

    <div id="rn-cur" class="cur-preview">No subtitle selected</div>

    <label class="lbl-sm" style="margin-top:10px">Note for this record</label>
    <textarea id="rn-note" class="ctx-input" rows="6"
              placeholder="e.g. not confident on the transcription — verify against the audio · proper noun, double-check the spelling · should reference the same character as line 12 · whisper sometimes mishears X as Y"></textarea>
    <div id="rn-save-status" style="font-size:11px;color:#888;margin-top:6px;min-height:14px"></div>
  </div>
</div>

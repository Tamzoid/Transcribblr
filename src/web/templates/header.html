<div id="hdr">
  <span class="hdr-f" id="hdr-f" title="Click to switch file" style="cursor:pointer" onclick="window.openFilePicker()">— ▾</span>
  <span class="hdr-c" id="hdr-c">–</span>
  <button id="btn-undo" title="Undo" disabled style="background:none;border:1px solid #2a2a2a;border-radius:5px;color:#555;font-size:14px;cursor:pointer;padding:2px 7px;line-height:1;opacity:0.35">⎌</button>
  <button id="btn-fs" title="Fullscreen" style="background:none;border:1px solid #2a2a2a;border-radius:5px;color:#555;font-size:14px;cursor:pointer;padding:2px 7px;line-height:1">⛶</button>
</div>

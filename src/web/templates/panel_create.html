<div id="panel-create" style="display:none">
  <div class="create-section">
    <div class="lbl">Upload Video</div>
    <label id="drop-zone">
      <input type="file" id="video-input" accept="video/*">
      <div id="drop-hint">
        <div class="drop-icon">⬆</div>
        <div>Drop a video file here or click to browse</div>
        <div class="drop-sub">mp4, mkv, mov, avi, webm…</div>
      </div>
    </label>
    <div id="upload-prog" style="display:none">
      <div id="upload-bar-wrap"><div id="upload-bar"></div></div>
      <div id="upload-status"></div>
    </div>
  </div>
  <div class="create-section">
    <div class="create-hdr">
      <div class="lbl">Input Files</div>
    </div>
    <div id="input-file-list"><div class="ib">Loading…</div></div>
    <button id="btn-process" class="btn bp" disabled>▶ Process Selected</button>
  </div>
  <div id="process-log" style="display:none">
    <div class="lbl">Processing Log</div>
    <div id="process-log-lines"></div>
  </div>
  <div class="create-section">
    <div class="lbl">Import Project</div>
    <label id="import-drop-zone">
      <input type="file" id="import-input" accept=".zip">
      <div id="import-hint">
        <div class="drop-icon">📦</div>
        <div>Drop a project ZIP here or click to browse</div>
        <div class="drop-sub">Transcribblr project exports</div>
      </div>
    </label>
    <div id="import-prog" style="display:none">
      <div id="import-bar-wrap"><div id="import-bar"></div></div>
      <div id="import-status"></div>
    </div>
  </div>
</div>

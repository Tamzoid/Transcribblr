<div id="tp-export" class="tp">
  <div style="padding:4px 0">
    <div class="lbl" style="margin-bottom:10px">Export as VTT</div>
    <div class="row" style="margin-bottom:12px;gap:8px">
      <button class="btn bp export-btn" data-format="english">🇬🇧 English</button>
      <button class="btn bp export-btn" data-format="japanese">🇯🇵 Japanese</button>
      <button class="btn bp export-btn" data-format="romaji">🔤 Romaji</button>
      <button class="btn bp export-btn" data-format="all">📋 All</button>
    </div>
    <div id="export-status" style="font-size:11px;color:#555;min-height:16px"></div>
    <div id="export-preview" style="margin-top:10px;display:none">
      <div class="lbl" style="margin-bottom:6px">Preview (first 5 cues)</div>
      <pre id="export-preview-text" style="background:#0d0d0d;border:1px solid #2a3a30;
        border-radius:6px;padding:10px;font-size:10px;color:#aaa;
        overflow-x:auto;white-space:pre-wrap;max-height:200px;overflow-y:auto"></pre>
    </div>
  </div>
</div>

<div id="tp-speakers" class="tp">
  <div id="ann-pane-records" class="ann-pane">
    <div class="ann-nav">
      <button class="nbtn" id="rec-prev">⬅</button>
      <select id="rec-sel" title="Pick a subtitle record"></select>
      <button class="nbtn" id="rec-next">➡</button>
    </div>

    <div id="rec-edit" style="display:none;margin-top:10px">
      <div id="rec-no-chars" class="ann-empty" style="display:none;margin-bottom:10px">
        No characters yet — add some on the <strong>Context → Characters</strong> tab first.
      </div>
      <!-- AI speaker-guess suggestion banner — only visible when the
           current record has a pending speaker_suggestion. -->
      <div id="rec-suggestion" style="display:none;background:#0d1f24;border:1px solid #205560;
        border-radius:6px;padding:8px 10px;margin-bottom:10px;font-size:11px;color:#b0e0e8;line-height:1.4">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
          <div style="flex:1;min-width:0">
            <span style="font-weight:700;color:#7dd3e0">💡 Suggested speaker:</span>
            <span id="rec-suggestion-name"></span>
            <span id="rec-suggestion-conf" style="color:#5a9aa3;font-size:10px"></span>
            <div id="rec-suggestion-note" style="color:#8aaab0;margin-top:4px;font-style:italic"></div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn" id="rec-suggestion-accept" style="padding:2px 10px;font-size:10px;background:#0a1f12;color:#00ff88">Accept</button>
            <button class="btn" id="rec-suggestion-dismiss" style="padding:2px 10px;font-size:10px">Dismiss</button>
          </div>
        </div>
      </div>

      <div id="rec-spk-section" style="display:none">
        <label class="lbl-sm">Speaker (tap to select; tap again to clear)</label>
        <div id="rec-pills" class="speaker-pills"></div>

        <label class="lbl-sm" style="margin-top:10px">Speaker note</label>
        <input id="rec-spnote" type="text" class="ctx-input"
               placeholder="e.g. talking to Simon · shouting / angry"/>
      </div>

      <label class="lbl-sm" style="margin-top:10px">Record note (LLM hints / transcription confidence)</label>
      <textarea id="rec-note" class="ctx-input" rows="4"
                placeholder="e.g. not confident on the transcription · proper noun, double-check spelling · whisper sometimes mishears X as Y"></textarea>

      <div id="rec-save-status" style="font-size:11px;color:#888;margin-top:6px;min-height:14px"></div>
    </div>
  </div>
</div>

<div id="tp-new" class="tp on">
  <!-- ── Normal mode ──────────────────────────────────────────────────────── -->
  <div id="new-normal">

    <!-- One row, swapped based on whether we're inside a record. -->
    <div class="new-actions">
      <div class="new-add-row" id="new-add-row">
        <button class="nbtn" id="new-prev" title="Jump to start of previous record">⏮</button>
        <button class="btn bp" id="new-add">＋ Add record</button>
        <button class="nbtn" id="new-next" title="Jump to start of next record">⏭</button>
      </div>
      <div class="new-actions-row" id="new-actions-row" style="display:none">
        <button class="btn"           id="new-split">✂ Split</button>
        <button class="btn btn-danger" id="new-delete">🗑 Delete</button>
      </div>
    </div>

    <div class="new-time-section">
      <div class="new-time-headers"><span>START</span><span>END</span></div>
      <div class="new-nudges">
        <button class="nudge" data-newnudge="s,-0.5">&lt;</button>
        <button class="nudge" data-newnudge="s,0.5">&gt;</button>
        <button class="nudge" data-newnudge="e,-0.5">&lt;</button>
        <button class="nudge" data-newnudge="e,0.5">&gt;</button>

        <button class="nudge nudge-now" data-newnudge="s,now">now</button>
        <button class="nudge nudge-now" data-newnudge="e,now">now</button>

        <button class="nudge" data-newnudge="s,-1">&lt;&lt;</button>
        <button class="nudge" data-newnudge="s,1">&gt;&gt;</button>
        <button class="nudge" data-newnudge="e,-1">&lt;&lt;</button>
        <button class="nudge" data-newnudge="e,1">&gt;&gt;</button>
      </div>
    </div>
  </div>

  <!-- ── Split mode ───────────────────────────────────────────────────────── -->
  <div id="new-split-mode" style="display:none">
    <div class="lbl-sm">Splitting at <span id="new-split-time">—</span> · choose where the JA text breaks</div>
    <div id="new-split-p1" class="prev-box">—</div>
    <div id="new-split-p2" class="prev-box">—</div>
    <div class="ann-time-grid ann-time-grid-4" style="margin-top:8px">
      <button class="nudge" data-charnudge="-3">&lt;&lt; −3</button>
      <button class="nudge" data-charnudge="-1">&lt; −1</button>
      <button class="nudge" data-charnudge="1">+1 &gt;</button>
      <button class="nudge" data-charnudge="3">+3 &gt;&gt;</button>
    </div>
    <div style="display:flex;gap:6px;margin-top:6px">
      <button class="btn bp" id="new-split-confirm">✓ Confirm split</button>
      <button class="btn"    id="new-split-cancel">Cancel</button>
    </div>
  </div>

  <!-- ── Big play/pause ───────────────────────────────────────────────────── -->
  <div class="new-play-wrap">
    <button id="new-play" class="big-play" title="Play / Pause">▶</button>
  </div>
</div>

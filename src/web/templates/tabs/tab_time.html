<div id="tp-time" class="tp on">
  <div id="time-slider" style="margin:18px 4px 28px"></div>
  <input type="hidden" id="es" value="0">
  <input type="hidden" id="ee" value="1">
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:3px;margin-bottom:10px">
    <div style="grid-column:1/3;font-size:9px;color:#555;text-align:center;margin-bottom:2px">START</div>
    <div style="grid-column:3/5;font-size:9px;color:#00d9ff;text-align:center;margin-bottom:2px">SET NOW</div>
    <div style="grid-column:5/7;font-size:9px;color:#555;text-align:center;margin-bottom:2px">END</div>
    <button class="btn" id="ts-s-dn"  style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:4px 0;font-size:13px">◀</button>
    <button class="btn" id="ts-s-up"  style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:4px 0;font-size:13px">▶</button>
    <button class="btn" id="ts-s-now" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#00d9ff;padding:4px 0;font-size:11px">⏱S</button>
    <button class="btn" id="ts-e-now" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#00d9ff;padding:4px 0;font-size:11px">⏱E</button>
    <button class="btn" id="ts-e-dn"  style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:4px 0;font-size:13px">◀</button>
    <button class="btn" id="ts-e-up"  style="background:#1a1a1a;border:1px solid #2a2a2a;color:#aaa;padding:4px 0;font-size:13px">▶</button>
  </div>
  <button class="btn bp" id="btn-save-time">SAVE TIME</button>
</div>

<div class="export-panel">
  <div class="lbl" style="margin-bottom:12px">Replace subtitles from file</div>
  <div style="font-size:11px;color:#888;margin-bottom:12px;line-height:1.5">
    Upload a <code>.srt</code>, <code>.vtt</code>, or <code>.txt</code> file. The current project's
    <strong>subtitles will be replaced</strong> with the parsed entries. TXT files are assumed to be
    in SRT format.
  </div>
  <label id="subimp-drop-zone" class="drop-zone">
    <input type="file" id="subimp-input" accept=".srt,.vtt,.txt">
    <div class="drop-hint">
      <div class="drop-icon">📝</div>
      <div>Drop a subtitle file here or click to browse</div>
      <div class="drop-sub">srt, vtt, txt</div>
    </div>
  </label>
  <div id="subimp-status" style="margin-top:10px;font-size:11px;color:#888;min-height:16px"></div>
</div>

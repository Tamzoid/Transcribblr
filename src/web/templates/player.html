<div id="player">
  <div id="video-wrap" style="display:none">
    <video id="video-el" playsinline muted preload="metadata"></video>
  </div>
  <div class="player-ctrls-top">
    <label class="vid-toggle" id="video-toggle-wrap" style="display:none">
      <input type="checkbox" id="video-toggle"><span>📺 Video</span>
    </label>
    <select id="audio-src">
      <option value="vocals">🎤 Vocals</option>
      <option value="full">🎵 Full</option>
    </select>
  </div>
  <div id="wsl"><span class="spin"></span>LOADING AUDIO…</div>
  <div id="wf"></div>
  <div class="wt"><span id="wc">0:00:00,000</span><span id="wd">—</span></div>
  <div class="wtr">
    <button class="wb wsb" id="ws-down" title="Slower">−</button>
    <button class="wb wsb" id="ws-reset" title="Reset to 1.00×">1.00×</button>
    <button class="wb wsb" id="ws-up" title="Faster">+</button>
    <button class="wb" id="wplay"><span class="bi" id="wpi">▶</span><span class="bl" id="wpl">PLAY</span></button>
  </div>
</div>

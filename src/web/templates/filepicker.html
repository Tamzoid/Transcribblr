<div id="fp-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.85);z-index:99998;align-items:center;justify-content:center">
  <div style="background:#111;border:1px solid #1e3a2a;border-radius:10px;
    padding:18px;width:90%;max-width:480px;max-height:80vh;display:flex;flex-direction:column;gap:10px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="color:#00ff88;font-size:13px;font-weight:700">Select SRT File</span>
      <button onclick="closeFilePicker()" style="background:none;border:none;color:#555;
        font-size:18px;cursor:pointer;padding:0 4px">&#x2715;</button>
    </div>
    <input id="fp-search" type="text" placeholder="Filter&hellip;" oninput="window.filterFiles(this.value)"
      style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:4px;color:#ccc;
      padding:6px 8px;font-size:12px;font-family:inherit;width:100%">
    <div id="fp-list" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:4px"></div>
    <div id="fp-status" style="font-size:10px;color:#555;text-align:center"></div>
  </div>
</div>
